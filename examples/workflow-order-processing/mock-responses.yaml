# Mock responses for the workflow-order-processing example.
# Responses are keyed by scenario ID and turn number.
#
# Turn numbering accounts for the ProviderStage multi-round loop:
# - Turn N: LLM responds with tool call (workflow__transition)
# - Turn N+1: LLM sees tool result and responds with text (no more tool calls)
# Each pipeline execution consumes 2 mock turns when a transition occurs.

scenarios:
  order-flow:
    turns:
      # Pipeline turn 1: User asks about order -> LLM confirms and transitions to payment
      1:
        response: "Great news! Your order for Wireless Headphones has been confirmed. Order number: ORD-12345. Let me process your payment now."
        tool_calls:
          - name: workflow__transition
            arguments:
              event: PaymentReceived
              context: "Order ORD-12345 confirmed for Wireless Headphones. Processing payment."
      2: "Your payment of $79.99 has been successfully processed via PayPal. Transaction ID: TXN-67890. Your order is being prepared for shipping."

      # Pipeline turn 2: User asks about payment -> LLM transitions to fulfillment
      3:
        response: "Your payment was confirmed. Let me check the shipping status for you. Your order has been shipped!"
        tool_calls:
          - name: workflow__transition
            arguments:
              event: ItemShipped
              context: "Payment confirmed via PayPal (TXN-67890). Order shipped."
      4: "Your package is on its way! Tracking number: TRACK-11111. Estimated delivery: 3-5 business days via Express Shipping."

      # Pipeline turn 3: User asks about delivery -> LLM transitions to complete
      5:
        response: "According to our records, your package has been delivered to the address on file."
        tool_calls:
          - name: workflow__transition
            arguments:
              event: Delivered
              context: "Package delivered to customer address. Tracking: TRACK-11111."
      6: "Wonderful! Your Wireless Headphones have been delivered. If you have any issues, you can return within 30 days. Enjoy your purchase!"

      # Pipeline turn 4: Customer confirms
      7: "Thank you for shopping with ShopCo! We hope you enjoy your Wireless Headphones. If you need anything, we're here to help."

  # Single-turn stage unit test. No transition — the turn stays in the pinned
  # 'fulfillment' stage so the state_is assertion can observe it directly.
  unit-fulfillment-stage:
    turns:
      1: "Your package has shipped and is on its way! Tracking number: TRACK-33333. Estimated delivery: 2-3 business days."

  validation-checks:
    turns:
      # Pipeline turn 1: Order placed -> transition to payment
      1:
        response: "Your order for 2 USB-C Cables has been placed. Order number: ORD-54321. Total: $19.98. Processing payment now."
        tool_calls:
          - name: workflow__transition
            arguments:
              event: PaymentReceived
              context: "Order ORD-54321 for 2 USB-C Cables, $19.98."
      2: "Payment of $19.98 received via credit card. Transaction ID: TXN-98765."

      # Pipeline turn 2: Payment -> fulfillment
      3:
        response: "Payment confirmed. Your order is being shipped."
        tool_calls:
          - name: workflow__transition
            arguments:
              event: ItemShipped
              context: "Order shipped. TXN-98765 confirmed."
      4: "Your package is on its way! Tracking number: TRACK-22222. Expected delivery in 2-3 business days."

      # Pipeline turn 3: Fulfillment -> complete
      5:
        response: "Your package has been delivered!"
        tool_calls:
          - name: workflow__transition
            arguments:
              event: Delivered
              context: "Package delivered. Tracking: TRACK-22222."
      6: "Your 2 USB-C Cables have been delivered. Our 30 day return policy applies. Enjoy!"

      # Pipeline turn 4: Confirmation
      7: "Thank you for your order! If you need anything, don't hesitate to reach out."
