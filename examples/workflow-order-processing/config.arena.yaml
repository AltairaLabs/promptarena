apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Arena
metadata:
  name: workflow-order-processing-arena
spec:
  prompt_configs:
    - id: new_order
      file: prompts/new_order.yaml
    - id: payment
      file: prompts/payment.yaml
    - id: fulfillment
      file: prompts/fulfillment.yaml
    - id: complete
      file: prompts/complete.yaml

  providers:
    - file: providers/mock-provider.yaml

  scenarios:
    - file: scenarios/order-flow.scenario.yaml
    - file: scenarios/validation-checks.scenario.yaml
    - file: scenarios/unit-fulfillment-stage.scenario.yaml

  workflow:
    version: 1
    entry: new_order
    states:
      new_order:
        prompt_task: new_order
        description: "Order placed, awaiting payment"
        on_event:
          PaymentReceived: payment
      payment:
        prompt_task: payment
        description: "Payment confirmed, awaiting fulfillment"
        on_event:
          ItemShipped: fulfillment
      fulfillment:
        prompt_task: fulfillment
        description: "Order shipped, awaiting delivery"
        on_event:
          Delivered: complete
      complete:
        prompt_task: complete
        description: "Order delivered"
        terminal: true

  defaults:
    temperature: 0.1
    max_tokens: 512
    output:
      dir: out
      formats: ["json", "html"]
