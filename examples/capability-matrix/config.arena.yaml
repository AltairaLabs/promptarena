apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Arena

metadata:
  name: capability-matrix

spec:
  prompt_configs:
    - id: capability-test
      file: prompts/capability-test.yaml
    - id: capability-test-tools
      file: prompts/capability-test-tools.yaml

  providers:
    # ==========================================================================
    # OpenAI Models
    # ==========================================================================

    # GPT-5.x family
    - file: providers/openai-gpt55.provider.yaml
      group: text,streaming,vision,tools,json
    - file: providers/openai-gpt54.provider.yaml
      group: text,streaming,vision,tools,json
    - file: providers/openai-gpt54-mini.provider.yaml
      group: text,streaming,tools,json
    - file: providers/openai-gpt52.provider.yaml
      group: text,streaming,vision,tools,json
    - file: providers/openai-gpt52-pro.provider.yaml
      group: text,streaming,vision,tools,json
    - file: providers/openai-gpt51.provider.yaml
      group: text,streaming,vision,tools,json
    - file: providers/openai-gpt5.provider.yaml
      group: text,streaming,vision,tools,json
    - file: providers/openai-gpt5-mini.provider.yaml
      group: text,streaming,tools,json
    - file: providers/openai-gpt5-nano.provider.yaml
      group: text,streaming,tools,json
    - file: providers/openai-gpt5-pro.provider.yaml
      group: text,streaming,vision,tools,json

    # GPT-4.1 family
    - file: providers/openai-gpt41.provider.yaml
      group: text,streaming,vision,tools,json
    - file: providers/openai-gpt41-mini.provider.yaml
      group: text,streaming,vision,tools,json
    - file: providers/openai-gpt41-nano.provider.yaml
      group: text,streaming,vision,tools,json

    # GPT-4o family
    - file: providers/openai-gpt4o.provider.yaml
      group: text,streaming,vision,tools,json
    - file: providers/openai-gpt4o-mini.provider.yaml
      group: text,streaming,vision,tools,json

    # OpenAI audio models are intentionally not in the matrix. The retired
    # gpt-4o-audio-preview line was replaced by the GA gpt-audio models, but
    # those don't fit this scenario's audio-in/text-out + text-assertion shape:
    # gpt-audio-mini requires an audio OUTPUT modality, and gpt-audio-1.5 is
    # inconsistent (intermittent 400 "requires input/output audio modality").
    # Audio capability is covered by the Gemini providers below, which pass the
    # audio scenario cleanly. Revisit if an output-modality-aware audio scenario
    # is added.

    # o-series reasoning models (use max_completion_tokens, no temperature/top_p)
    - file: providers/openai-o1.provider.yaml
      group: text,streaming,json
    # o1-pro uses v1/responses API (automatically selected)
    - file: providers/openai-o1-pro.provider.yaml
      group: text,streaming,json
    - file: providers/openai-o3.provider.yaml
      group: text,streaming,tools,json
    - file: providers/openai-o3-mini.provider.yaml
      group: text,streaming,tools,json
    - file: providers/openai-o4-mini.provider.yaml
      group: text,streaming,tools,json

    # ==========================================================================
    # Anthropic Models
    # ==========================================================================

    # Claude 4.x latest
    - file: providers/anthropic-opus48.provider.yaml
      group: text,streaming,vision,tools,json
    - file: providers/anthropic-opus47.provider.yaml
      group: text,streaming,vision,tools,json

    # Claude 4.6 family
    - file: providers/anthropic-opus46.provider.yaml
      group: text,streaming,vision,tools,json
    - file: providers/anthropic-sonnet46.provider.yaml
      group: text,streaming,vision,tools,json

    # Claude 4.5 family
    - file: providers/anthropic-opus45.provider.yaml
      group: text,streaming,vision,tools,json
    - file: providers/anthropic-sonnet45.provider.yaml
      group: text,streaming,vision,tools,json
    - file: providers/anthropic-haiku45.provider.yaml
      group: text,streaming,vision,tools,json

    # Claude 4.1
    - file: providers/anthropic-opus41.provider.yaml
      group: text,streaming,vision,tools,json
    # Note: claude-opus-4 and claude-sonnet-4 (the 20250514 base 4.0 models)
    # retired 2026-06-15 and were removed. Opus 4.1/4.5/4.6/4.7/4.8 and
    # Sonnet 4.5/4.6 above cover the lineage.

    # ==========================================================================
    # Google Gemini Models (uses v1beta API endpoint)
    # ==========================================================================

    # Gemini 3.x family
    # gemini-3-pro-preview retired (replaced by 3.1 Pro); gemini-3-flash-preview
    # superseded by 3.5 Flash.
    - file: providers/gemini-31-pro.provider.yaml
      group: text,streaming,vision,tools,json,audio,video
    - file: providers/gemini-35-flash.provider.yaml
      group: text,streaming,vision,tools,json,audio,video
    - file: providers/gemini-31-flash-lite.provider.yaml
      group: text,streaming,vision,tools,json,audio,video

    # Gemini 2.5 family
    - file: providers/gemini-25-pro.provider.yaml
      group: text,streaming,vision,tools,json,audio,video
    - file: providers/gemini-25-flash.provider.yaml
      group: text,streaming,vision,tools,json,audio,video
    - file: providers/gemini-25-flash-lite.provider.yaml
      group: text,streaming,vision,tools,json,audio,video

    # Gemini 2.0 family retired 2026-06-01 (replaced by 3.5 Flash /
    # 3.1 Flash Lite).

    # ==========================================================================
    # Ollama Local Models
    # ==========================================================================
    # - file: providers/ollama-llama32-3b.provider.yaml  # requires local server, fails in CI
    #   group: text,streaming,tools,json

    # ==========================================================================
    # Mock Provider (for CI testing)
    # ==========================================================================
    - file: providers/mock.provider.yaml
      group: text,streaming,tools,json

  scenarios:
    - file: scenarios/text-basic.scenario.yaml
    - file: scenarios/streaming.scenario.yaml
    - file: scenarios/vision.scenario.yaml
    - file: scenarios/tools.scenario.yaml
    - file: scenarios/json-mode.scenario.yaml
    - file: scenarios/audio.scenario.yaml
    - file: scenarios/video.scenario.yaml
    # Combination scenarios
    - file: scenarios/streaming-tools.scenario.yaml
    - file: scenarios/streaming-vision.scenario.yaml
    - file: scenarios/streaming-tools-vision.scenario.yaml
    - file: scenarios/tools-vision.scenario.yaml

  tools:
    - file: tools/get-weather.tool.yaml
    - file: tools/analyze-image.tool.yaml

  defaults:
    temperature: 0.1
    max_tokens: 500
    concurrency: 6
    output:
      dir: out
      formats: ["json", "markdown", "html"]
      html:
        file: capability-matrix.html
      markdown:
        file: capability-matrix.md
        include_details: true
        show_overview: true
        show_results_matrix: true
        show_failed_tests: true
        show_cost_summary: true
    fail_on: []
