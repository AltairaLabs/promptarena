apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Scenario

metadata:
  name: streaming-tools

spec:
  id: streaming-tools
  task_type: capability-test-tools
  description: "Test streaming with tool calls"
  required_capabilities:
    - streaming
    - tools
  streaming: true
  providers:
    - openai-gpt41-mini
    - anthropic-sonnet46
    - gemini-35-flash

  turns:
    - role: user
      content: "Call the get_weather function for New York City and tell me the result."
      assertions:
        - type: tools_called
          message: "Should call the get_weather tool with arguments"
          params:
            tools:
              - "get_weather"
            require_args: true
