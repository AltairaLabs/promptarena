apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: PromptConfig
metadata:
  name: support
spec:
  version: "1.0.0"
  task_type: "support"
  system_template: "You are a support agent for {{company}}."
  variables:
    - name: company
      type: string
      required: false
      default: "DefaultCo"
