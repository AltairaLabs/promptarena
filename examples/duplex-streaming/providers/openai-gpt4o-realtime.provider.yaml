# yaml-language-server: $schema=https://promptkit.altairalabs.ai/schemas/latest/provider.json
#
# OpenAI GPT-4o Realtime Provider
# Realtime API support for bidirectional audio streaming with low latency.
#
apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: openai-gpt4o-realtime

spec:
  id: openai-gpt4o-realtime
  type: openai
  # GA model — ~3x cheaper than the preview model ($0.032/1K vs $0.10/1K
  # input audio). Requires the GA Realtime API session schema (no OpenAI-Beta
  # header; type/output_modalities/audio.{input,output} nesting).
  model: gpt-realtime

  # Provider defaults
  defaults:
    temperature: 0.7
    top_p: 1.0
    max_tokens: 1000

  # OpenAI Realtime API configuration
  additional_config:
    # Use realtime API endpoint
    realtime: true
    # Voice configuration
    voice: alloy
    # Audio format settings
    audio_format: pcm16
