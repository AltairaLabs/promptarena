# SonarCloud configuration for PromptArena
sonar.projectKey=AltairaLabs_promptarena
sonar.organization=altairalabs

sonar.projectName=PromptArena
sonar.projectVersion=1.0

# Source configuration — Go tools + npm wrappers.
# Note: *_interactive.go and *_integration.go are NOT excluded here — they are
# production code (CLI/TUI/audio I/O and engine/pipeline wiring) and must be
# scanned for bugs, smells, and security like any other source.
sonar.sources=arena,packc,npm
sonar.inclusions=**/*.go,**/*.ts,**/*.js
sonar.exclusions=**/*_test.go,**/test_*.go,**/*.test.ts,**/*.test.js,**/tests/**,**/testdata/**,**/vendor/**,**/bin/**,**/*.md,**/.git/**,**/node_modules/**,**/dist/**,**/coverage/**,**/jest.config.js,**/jest.config.ts,**/*.pb.go

# Go settings
sonar.go.coverage.reportPaths=coverage.out

# JavaScript coverage (npm wrappers)
sonar.javascript.lcov.reportPaths=npm/promptarena/coverage/lcov.info,npm/packc/coverage/lcov.info

# Coverage exclusions — genuinely untestable interactive I/O, platform-specific
# (CI is Linux), CLI entrypoints, npm bin wrappers, generated protobuf.
# *_integration.go is deliberately NOT coverage-exempt: it holds testable seam
# logic (engine/provider/tool/MCP wiring) and must meet the coverage gate.
sonar.coverage.exclusions=**/arena/cmd/promptarena/init.go,**/*_interactive.go,**/*_windows.go,**/*_darwin.go,**/dist/**,**/npm/**/bin/**,**/npm/**/postinstall.js,**/*.pb.go,**/arena/agentkb/**,**/arena/inspect/grid.go
