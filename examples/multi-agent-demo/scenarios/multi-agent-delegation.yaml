apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Scenario
metadata:
  name: multi-agent-delegation
spec:
  id: "multi-agent-delegation"
  task_type: assistant
  description: "Test multi-agent delegation: assistant routes a research query to one A2A agent and a translation query to another. Asserts both delegations and the agent-specific response content."

  tool_policy:
    tool_choice: auto
    max_tool_calls_per_turn: 3
    max_total_tool_calls: 5

  turns:
    # Turn 1: Research query — assistant must delegate to research_agent
    - role: user
      content: "Search for papers about quantum computing"
      assertions:
        - type: agent_invoked
          params:
            agents:
              - a2a__research_agent__search_papers
            message: "Should delegate to the research agent"
        - type: agent_response_contains
          params:
            agent: a2a__research_agent__search_papers
            contains: "Quantum Computing Fundamentals"
            message: "Research agent should return quantum computing papers"

    # Turn 2: Translation query — assistant must delegate to translation_agent
    - role: user
      content: "Translate the summary to French"
      assertions:
        - type: agent_invoked
          params:
            agents:
              - a2a__translation_agent__translate
            message: "Should delegate to the translation agent"
        - type: agent_response_contains
          params:
            agent: a2a__translation_agent__translate
            contains: "informatique quantique"
            message: "Translation agent should return French text"

  # Conversation-level assertion verifies the overall delegation pattern.
  conversation_assertions:
    - type: agent_invoked
      params:
        agents:
          - a2a__research_agent__search_papers
          - a2a__translation_agent__translate
      message: "Both agents should be invoked across the conversation"
