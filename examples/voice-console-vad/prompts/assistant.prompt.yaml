# yaml-language-server: $schema=https://promptkit.altairalabs.ai/schemas/latest/promptconfig.json
apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: PromptConfig
metadata:
  name: voice-assistant
spec:
  task_type: voice-assistant
  version: "1.0.0"
  description: "A friendly general-purpose voice assistant driven by STT + TTS (VAD mode)"
  system_template: |
    You are a friendly, helpful voice assistant.

    Your replies are read aloud by a text-to-speech engine, so keep them short
    and conversational — a sentence or two. No lists, no markdown, no headings.
    Ask a brief clarifying question if you need one. Be warm and natural.
