apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: anthropic-opus47
spec:
  id: anthropic-opus47
  type: claude
  model: claude-opus-4-7
  capabilities:
    - text
    - streaming
    - vision
    - tools
    - json
    - documents
  # Claude Opus 4.7+ deprecated the temperature parameter (API returns 400 if
  # sent). The Claude provider drops params listed here before the request.
  unsupported_params:
    - temperature
  defaults:
    # temperature is required by the schema; unsupported_params strips it from
    # the request so Claude 4.7+ (which rejects it) never receives it.
    temperature: 0.1
    top_p: 1.0
    max_tokens: 100
  pricing:
    input_cost_per_1k: 0.005
    output_cost_per_1k: 0.025
  stream_retry:
    enabled: true
    max_attempts: 3
