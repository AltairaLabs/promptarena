apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Arena
metadata:
  name: workflow-skills-arena
spec:
  prompt_configs:
    - id: intake
      file: prompts/intake.yaml
    - id: billing
      file: prompts/billing.yaml
    - id: orders
      file: prompts/orders.yaml
    - id: closed
      file: prompts/closed.yaml

  providers:
    - file: providers/mock-provider.yaml

  scenarios:
    - file: scenarios/billing-flow.scenario.yaml
    - file: scenarios/orders-flow.scenario.yaml

  skills:
    # Load everything under skills/ as on-demand. The LLM can discover these
    # from the skill__activate tool description (which includes the
    # available-skills index) and activate them when needed.
    - path: skills/
    # Upgrade brand-voice to preload — its instructions are injected into the
    # system prompt from turn 1 without requiring skill__activate.
    # Later entries can upgrade the preload flag but cannot change path/metadata.
    - path: skills/brand-voice
      preload: true

  workflow:
    version: 1
    entry: intake
    states:
      intake:
        prompt_task: intake
        description: "Initial customer contact and triage"
        on_event:
          RouteBilling: billing
          RouteOrders: orders
          Resolve: closed
      billing:
        prompt_task: billing
        description: "Billing specialist handling"
        skills: "skills/billing/*"
        on_event:
          Resolve: closed
      orders:
        prompt_task: orders
        description: "Orders specialist handling"
        skills: "skills/orders/*"
        on_event:
          Resolve: closed
      closed:
        prompt_task: closed
        description: "Conversation complete"
        skills: none
        terminal: true

  defaults:
    temperature: 0.1
    max_tokens: 512
    output:
      dir: out
      formats: ["json", "html"]
