name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag -s v1.5.5 -m "v1.5.5" && git push origin v1.5.5
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write   # create GitHub releases

jobs:
  goreleaser:
    name: GoReleaser (binaries + GitHub release + Homebrew)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.0'
      # Node + pnpm are needed by goreleaser's before-hooks, which build the
      # embedded Arena web UI (arena/web/frontend) so `promptarena serve` isn't
      # a blank page in released binaries.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        run: npm install -g pnpm@10
      - name: Install ALSA dev headers (for voice CGO)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Homebrew cask push to AltairaLabs/homebrew-tap
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  npm-publish:
    name: npm publish
    needs: goreleaser
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pkg: [promptarena, packc]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Set version from tag
        working-directory: npm/${{ matrix.pkg }}
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: Publish
        working-directory: npm/${{ matrix.pkg }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  major-tag:
    name: Update floating major tag (for @vN action refs)
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # Consumers reference the composite actions as
      # AltairaLabs/promptarena/.github/actions/<name>@v1. Move the floating
      # major tag (v1) to this release so that ref keeps resolving. This tag is
      # co-located with the latest vX.Y.Z release commit, so Go ignores it
      # (not a complete semver version) and GoReleaser changelogs are unaffected.
      - name: Move major tag to this release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          MAJOR="${GITHUB_REF_NAME%%.*}"   # v1.5.6 -> v1
          git tag -fa "$MAJOR" -m "Release $GITHUB_REF_NAME"
          git push origin "$MAJOR" --force
