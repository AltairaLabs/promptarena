apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: anthropic-haiku45
spec:
  id: anthropic-haiku45
  type: claude
  model: claude-haiku-4-5-20251001
  capabilities:
    - text
    - streaming
    - vision
    - tools
    - json
    - documents
  defaults:
    temperature: 0.1
    top_p: 1.0
    max_tokens: 100
  pricing:
    input_cost_per_1k: 0.001
    output_cost_per_1k: 0.005
  stream_retry:
    enabled: true
    max_attempts: 3
