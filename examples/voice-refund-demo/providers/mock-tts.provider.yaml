# yaml-language-server: $schema=https://promptkit.altairalabs.ai/schemas/latest/provider.json
apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: mock-tts
spec:
  id: mock-tts
  type: mock
  role: tts
  # No audio_files: mock-TTS falls back to the built-in "mock user turn" clip
  # (24 kHz), so the persona side is audible and self-labeling with no fixtures.
  sample_rate: 24000
