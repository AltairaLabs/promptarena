apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Arena
metadata:
  name: workflow-support-arena
spec:
  prompt_configs:
    - id: intake
      file: prompts/intake.yaml
    - id: specialist
      file: prompts/specialist.yaml
    - id: closed
      file: prompts/closed.yaml

  providers:
    - file: providers/mock-provider.yaml

  scenarios:
    - file: scenarios/basic-flow.scenario.yaml
    - file: scenarios/state-assertions.scenario.yaml

  workflow:
    version: 1
    entry: intake
    states:
      intake:
        prompt_task: intake
        description: "Initial customer contact and triage"
        on_event:
          Escalate: specialist
          Resolve: closed
      specialist:
        prompt_task: specialist
        description: "Specialized support for escalated issues"
        on_event:
          Resolve: closed
      closed:
        prompt_task: closed
        description: "Conversation resolved"
        terminal: true

  defaults:
    temperature: 0.1
    max_tokens: 512
    output:
      dir: out
      formats: ["json", "html"]
