# yaml-language-server: $schema=https://promptkit.altairalabs.ai/schemas/latest/provider.json
#
# OpenAI gpt-4o — text agent (the LLM under test in VAD mode).
#
# A plain chat-completion provider: it does not stream audio, so the voice
# console drives it with client-side VAD + STT (input) and TTS (output).
#
# Requires OPENAI_API_KEY in the environment.
#
apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: openai-gpt4o
spec:
  id: openai-gpt4o
  type: openai
  model: gpt-4o
  defaults:
    temperature: 0.7
    top_p: 1.0
    max_tokens: 500
