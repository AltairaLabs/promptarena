apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Scenario
metadata:
  name: turn-budget
spec:
  id: turn-budget
  task_type: support
  description: "Assert each turn stays under a 1s budget."

  turns:
    - role: user
      content: "Hi, I need help with my account."
      assertions:
        - type: latency_budget
          params:
            max_ms: 1000
          message: "Turn must respond within 1000ms"

    - role: user
      content: "My account ID is ACC-12345."
      assertions:
        - type: latency_budget
          params:
            max_ms: 1000

    - role: user
      content: "Great, thank you."
      assertions:
        - type: latency_budget
          params:
            max_ms: 1000
