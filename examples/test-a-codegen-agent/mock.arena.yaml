apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Arena
metadata:
  name: codegen-agent-test-mock
  annotations:
    description: |
      Wiring check: the mock provider scripts the agent's tool calls; Docker
      executes them for real (only the LLM is faked). The SAME five gates run
      against both a known-good kit and a deliberately broken kit, proving the
      gates discriminate — good kit passes, broken kit fails — with no API spend.
      Also demonstrates workspace capture as a regular runtime exec SessionHook
      (see spec.runtime.hooks) — each sandbox's /workspace is copied to
      out-mock/kit/<session>/ at session end via docker cp, no promptarena flag.
      Needs PROMPTKIT_SCHEMA_SOURCE=local until the `runtime:` field is released.
      Run:
        make build-codegen-agent-sandbox
        cd examples/test-a-codegen-agent
        PROMPTKIT_SCHEMA_SOURCE=local promptarena run -c mock.arena.yaml --ci --out out-mock
        open out-mock/report.html
spec:
  prompt_configs:
    - id: authoring-agent
      file: prompts/authoring-agent.yaml
  providers:
    - file: providers/mock-provider.yaml
  scenarios:
    - file: scenarios/refund-assistant.mock.scenario.yaml
    - file: scenarios/refund-broken.mock.scenario.yaml
  mcp_servers:
    - name: sandbox
      source: docker
      scope: session
      source_args:
        image: codegen-agent-sandbox:local

  # promptarena-authoring skill as a skill__activate tool (not preloaded).
  skills:
    - path: skills

  # Pass-through runtime config. Workspace capture is a regular runtime exec
  # SessionHook — NOT a promptarena flag — so it works against any sandbox the
  # test creator wires. At session_end the host runs capture-workspace.sh, which
  # `docker cp`s each sandbox's /workspace (container IDs come from the
  # SessionEvent metadata the engine populates) into out-mock/kit/<session>/.
  runtime:
    hooks:
      capture-workspace:
        hook: session
        phases: ["session_end"]
        mode: observe
        command: tools/capture-workspace.sh

  # The same gates as the live config, applied to BOTH scenarios so the report
  # shows discrimination directly: the good kit goes green, the broken kit red.
  globals:
    conversation_assertions:
      - type: tool_exec
        message: "Gate 1: kit is schema-valid"
        params:
          tool: Bash
          timeout_seconds: 120
          success_pattern: "__GATE_OK__"
          args:
            command: "promptarena validate /workspace/kit/config.arena.yaml && echo __GATE_OK__"
            description: "Validate the generated kit's arena config against its schema"
      - type: tool_exec
        message: "Gate 2: kit compiles to a valid PromptPack"
        params:
          tool: Bash
          timeout_seconds: 120
          success_pattern: "__GATE_OK__"
          args:
            command: "packc compile -c /workspace/kit/config.arena.yaml -o /tmp/kit.pack.json && packc validate /tmp/kit.pack.json && echo __GATE_OK__"
            description: "Compile the kit to a PromptPack and validate it"
      - type: tool_exec
        message: "Gate 3: generated scenarios run green offline"
        params:
          tool: Bash
          timeout_seconds: 300
          success_pattern: "__GATE_OK__"
          args:
            command: "cd /workspace/kit && promptarena run --ci && echo __GATE_OK__"
            description: "Run the generated kit's scenarios offline"
      - type: tool_exec
        message: "Gate 4: no unused files"
        params:
          tool: Bash
          timeout_seconds: 60
          success_pattern: "__GATE_OK__"
          args:
            command: "unused-files.sh /workspace/kit && echo __GATE_OK__"
            description: "Check the kit for unreferenced files"
      - type: tool_exec
        message: "Gate 5: kit is a competent test suite (non-trivial assertions)"
        params:
          tool: Bash
          timeout_seconds: 60
          success_pattern: "__GATE_OK__"
          args:
            command: "kit-quality.sh /workspace/kit && echo __GATE_OK__"
            description: "Deterministic adequacy check: every scenario has a non-trivial assertion"
      - type: tool_exec
        message: "Metric: idiom-trap + adequacy report (non-gating)"
        params:
          tool: Bash
          timeout_seconds: 60
          success_pattern: "__GATE_OK__"
          args:
            command: "idiom-traps.sh /workspace/kit && echo __GATE_OK__"
            description: "Report idiom-trap and assertion-adequacy counts for the kit"

  defaults:
    output:
      dir: out-mock
      formats: ["html", "json"]
      html:
        file: report.html
