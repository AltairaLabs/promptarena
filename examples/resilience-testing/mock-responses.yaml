# Mock responses for resilience testing scenarios
#
# Demonstrates 25+ assertion types from the Dynamic Context &
# Tool-Using LLM Testing Proposal:
#
# Per-turn: min_length, max_length, content_includes, content_includes_any,
#   content_excludes, content_matches (regex), tools_called, tools_not_called,
#   tool_calls_with_args, guardrail_triggered, outcome_equivalent, directional
#
# Conversation-level: tool_call_sequence, tool_no_repeat, tool_anti_pattern,
#   tool_call_count, no_tool_errors, cost_budget, tool_efficiency,
#   tool_call_chain, invariant_fields_preserved
#
# Statistical: trials (multi-run), pass_threshold (per-assertion)
# Behavioral: perturbations (CheckList INV pattern)

defaultResponse: "I'm here to help with your request."

scenarios:
  # --- Scenario 1: Content Validation ---
  # Tests length, inclusion, exclusion, regex, guardrails on a single turn
  content-validation:
    defaultResponse: "Our return policy allows returns within 30 days of purchase. Items must be in original condition with tags attached. Refunds are processed within 5-7 business days."
    turns:
      1: "Our return policy allows returns within 30 days of purchase. Items must be in original condition with tags attached. Refunds are processed within 5-7 business days."

  # --- Scenario 2: Tool Pattern Validation ---
  # Multi-turn with tool calls: tests sequencing, no-repeat, anti-pattern, count
  tool-pattern-validation:
    defaultResponse: "I'll help you with that."
    turns:
      # Turn 1: LLM decides to call lookup_order
      1:
        tool_calls:
          - name: "lookup_order"
            arguments:
              order_id: "ORD-12345"
      # Turn 2: Text response after tool result
      2: "Your order ORD-12345 is currently being processed and will ship within 2 business days."
      # Turn 3: LLM decides to call search_faq
      3:
        tool_calls:
          - name: "search_faq"
            arguments:
              query: "return policies"
      # Turn 4: Text response after FAQ result
      4: "According to our FAQ, our return policy allows returns within 30 days of purchase for a full refund."

  # --- Scenario 3: Cost & Guardrails ---
  # Tests cost_budget, tool_efficiency, guardrail_triggered with tool use
  cost-and-guardrails:
    defaultResponse: "I'll look into that for you."
    turns:
      # Turn 1: LLM calls lookup_order
      1:
        tool_calls:
          - name: "lookup_order"
            arguments:
              order_id: "ORD-99999"
      # Turn 2: Text response with order details
      2: "Your order ORD-99999 is currently in transit and expected to arrive by Friday. You can track it through your account dashboard."

  # --- Scenario 4: Multi-Turn Consistency ---
  # 3 user turns: order lookup → FAQ search → farewell
  # Tests cross-turn tool sequencing, no-repeat, count bounds
  multi-turn-consistency:
    defaultResponse: "I'm happy to help!"
    turns:
      # Turn 1: LLM calls lookup_order for ORD-55555
      1:
        tool_calls:
          - name: "lookup_order"
            arguments:
              order_id: "ORD-55555"
      # Turn 2: Text response about the order
      2: "I found your order ORD-55555. It's currently being prepared for shipment and should ship within 1-2 business days."
      # Turn 3: LLM calls search_faq for warranty
      3:
        tool_calls:
          - name: "search_faq"
            arguments:
              query: "warranty policy"
      # Turn 4: Text response about warranty
      4: "According to our FAQ, all items come with a 12-month warranty covering manufacturing defects. You can file a warranty claim through your account."
      # Turn 5: Text farewell (no tool call)
      5: "You're welcome! If you have any other questions about your order or warranty, feel free to reach out anytime. Have a great day!"

  # --- Scenario 5: Negative Testing ---
  # Tests what the agent should NOT do: no tools on greeting, correct tool choice
  negative-testing:
    defaultResponse: "I'm here to help!"
    turns:
      # Turn 1: Simple greeting — no tool calls
      1: "Hello! Welcome to our support team. How can I help you today?"
      # Turn 2: LLM calls search_faq for tracking
      2:
        tool_calls:
          - name: "search_faq"
            arguments:
              query: "track shipment"
      # Turn 3: Text response about tracking
      3: "You can track your shipment by logging into your account and visiting the 'My Orders' section. Each order has a tracking link that shows real-time delivery status."

  # --- Scenario 6: Tool Chain & Efficiency ---
  # 3 user turns: two order lookups + FAQ search
  # Tests tool_call_chain, tool_efficiency, invariant_fields_preserved
  tool-chain-and-efficiency:
    defaultResponse: "Let me check that for you."
    turns:
      # Turn 1: First order lookup
      1:
        tool_calls:
          - name: "lookup_order"
            arguments:
              order_id: "ORD-11111"
      # Turn 2: Text response for first order
      2: "Order ORD-11111 is confirmed and being prepared for shipment."
      # Turn 3: Second order lookup
      3:
        tool_calls:
          - name: "lookup_order"
            arguments:
              order_id: "ORD-22222"
      # Turn 4: Text response for second order
      4: "Order ORD-22222 has been shipped and is in transit."
      # Turn 5: FAQ search
      5:
        tool_calls:
          - name: "search_faq"
            arguments:
              query: "bulk order discounts"
      # Turn 6: Text response about discounts
      6: "We offer bulk order discounts starting at 10% for orders of 10+ items. Contact our sales team for custom pricing on larger orders."

  # --- Scenario 7: Behavioral Testing ---
  # Tests outcome_equivalent and directional assertions
  behavioral-testing:
    defaultResponse: "I'll help you with that."
    turns:
      # Turn 1: Order lookup
      1:
        tool_calls:
          - name: "lookup_order"
            arguments:
              order_id: "ORD-77777"
      # Turn 2: Response about order status
      2: "Your order ORD-77777 is currently being processed and should ship within 2 business days."
      # Turn 3: FAQ search for return policy
      3:
        tool_calls:
          - name: "search_faq"
            arguments:
              query: "return policy"
      # Turn 4: Response about return policy
      4: "Our return policy allows returns within 30 days of purchase. Items must be in original condition for a full refund."

  # --- Scenario 8: Statistical Trials ---
  # Same scenario run 3 times — mock returns identical responses each trial
  statistical-trials:
    defaultResponse: "Our return policy allows returns within 30 days of purchase. Items must be in original condition with tags attached. Refunds are processed within 5-7 business days."
    turns:
      1: "Our return policy allows returns within 30 days of purchase. Items must be in original condition with tags attached. Refunds are processed within 5-7 business days."

  # --- Scenario 9: Perturbation Invariance ---
  # Tests with {order_id} substituted to ORD-11111, ORD-22222, ORD-33333
  # All variants get the same mock tool call + response pattern
  perturbation-invariance:
    defaultResponse: "Let me look that up for you."
    turns:
      # Turn 1: LLM calls lookup_order (order_id varies per perturbation)
      1:
        tool_calls:
          - name: "lookup_order"
            arguments:
              order_id: "ORD-00000"
      # Turn 2: Text response about the order
      2: "Your order is confirmed and currently being processed. Expected delivery is within 3-5 business days."
