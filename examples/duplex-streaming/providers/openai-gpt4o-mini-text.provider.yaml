# yaml-language-server: $schema=https://promptkit.altairalabs.ai/schemas/latest/provider.json
#
# OpenAI gpt-4o-mini — text-only.
#
# Used by the duplex-streaming arena's `selfplay-user` role to generate
# the user side of a self-play conversation. Selected over gemini-2.5-flash-lite
# because gemini's median latency on this prompt was ~3.5s (sometimes 7s),
# which dominated the inter-turn pause. gpt-4o-mini typically completes
# in 400-800ms.
#
apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: openai-gpt4o-mini-text

spec:
  id: openai-gpt4o-mini-text
  type: openai
  model: gpt-4o-mini
  pricing:
    input_cost_per_1k: 0.00015
    output_cost_per_1k: 0.0006
  defaults:
    temperature: 0.8
    top_p: 1.0
    max_tokens: 200
