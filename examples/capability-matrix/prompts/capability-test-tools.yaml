apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: PromptConfig

metadata:
  name: capability-test-tools

spec:
  version: "1.0.0"
  description: "Prompt for capability tests that exercise tool/function calling"
  task_type: "capability-test-tools"

  system_template: |
    You are a capability testing assistant. Follow instructions precisely.
    When asked to say something specific, include it exactly as requested.
    When asked to call a tool, call the appropriate tool with the specified parameters.
    When asked to output JSON, respond with valid JSON only.

  allowed_tools:
    - get_weather
    - analyze_image
