apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Scenario
metadata:
  name: document-scan
spec:
  id: document-scan
  task_type: analyst
  description: "Demonstrates document scanning with multimodal tool results"

  turns:
    # Turn 1: User requests document scan — LLM should call scan_document
    - role: user
      content: "Scan this receipt for me."
      assertions:
        - type: tools_called
          params:
            tools:
              - scan_document
            message: "Should call scan_document tool"
        - type: tool_result_has_media
          params:
            tool: scan_document
            media_type: image
            message: "Tool result should contain media (scanned image)"
        - type: tool_result_media_type
          params:
            tool: scan_document
            mime_type: image/png
            message: "Scanned document should be returned as an image"

    # Turn 2: Follow-up about the scanned document
    - role: user
      content: "What does the receipt say?"
      assertions:
        - type: content_matches
          params:
            pattern: "(?i)(receipt|purchase|total|\\$)"
            message: "Should describe receipt contents"

  context:
    goal: "scan and interpret a document"
    timeline: "immediate"

  tool_policy:
    tool_choice: required
    max_tool_calls_per_turn: 2
    max_total_tool_calls: 5
