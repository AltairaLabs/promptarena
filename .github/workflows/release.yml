name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag -s v1.5.5 -m "v1.5.5" && git push origin v1.5.5
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write   # create GitHub releases

jobs:
  goreleaser:
    name: GoReleaser (binaries + GitHub release + Homebrew)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
      - name: Install ALSA dev headers (for voice CGO)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Homebrew cask push to AltairaLabs/homebrew-tap
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  npm-publish:
    name: npm publish
    needs: goreleaser
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pkg: [promptarena, packc]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Set version from tag
        working-directory: npm/${{ matrix.pkg }}
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: Publish
        working-directory: npm/${{ matrix.pkg }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
