apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Scenario
metadata:
  name: faq-bot
  labels:
    use_case: support
    complexity: simple
spec:
  id: faq-bot
  task_type: authoring-agent
  description: "A developer asks (naively) for tests for an FAQ bot; scored against the deterministic gates."
  trials: 3
  turns:
    - role: user
      content: |
        I'm putting together an FAQ bot for my SaaS product's docs site. My main
        worry is that it'll confidently make things up instead of sticking to
        what's actually in our docs, or wander off onto unrelated topics. I'd
        like a test suite that catches that kind of thing, and I want to be able
        to run it offline while I tune the prompt — no API keys. Can you build it
        for me in a `kit/` folder?
