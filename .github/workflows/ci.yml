name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Detect whether anything outside docs/ changed. The Go pipeline is gated on
  # this so docs-only changes (which have their own Documentation workflow)
  # don't run — or fail — the Go build/lint. A *skipped* required job still
  # satisfies branch protection, unlike a workflow filtered out by `paths`.
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      actions: ${{ steps.filter.outputs.actions }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - 'sonar-project.properties'
              - 'npm/**'
            actions:
              - '.github/actions/**'

  build-test:
    name: Build & Test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
      - name: Install ALSA dev headers (for voice CGO)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./... -count=1

  lint:
    name: Lint (new code)
    # Inherited baseline: lint only NEW code on PRs. The extracted arena/packc
    # carry pre-existing findings grandfathered from PromptKit; hold new work to
    # standard without blocking on the inherited debt.
    needs: changes
    if: needs.changes.outputs.code == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
      - name: Install ALSA dev headers (for voice CGO)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      # v7 installs golangci-lint v2, matching the repo's `version: "2"`
      # .golangci.yml. v6 pins golangci-lint v1 (1.64.x), which rejects the v2
      # config and refused to run against go.mod's `go 1.26.0`.
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          only-new-issues: true

  sonarcloud:
    name: SonarCloud
    needs: changes
    # dependabot PRs cannot access secrets
    if: needs.changes.outputs.code == 'true' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
      - name: Install ALSA dev headers (for voice CGO)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Test with coverage
        run: go test ./... -coverprofile=coverage.out -count=1
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  test-actions:
    name: Test GitHub Actions (TypeScript)
    needs: changes
    if: needs.changes.outputs.actions == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        action: [promptarena-action, packc-action]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: .github/actions/${{ matrix.action }}/package-lock.json
      - name: Install dependencies
        working-directory: .github/actions/${{ matrix.action }}
        run: npm ci
      - name: Lint
        working-directory: .github/actions/${{ matrix.action }}
        run: npm run lint
      - name: Test
        working-directory: .github/actions/${{ matrix.action }}
        run: npm test
