apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Scenario
metadata:
  name: sentiment-guardrail
  labels:
    use_case: safety
    complexity: medium
spec:
  id: sentiment-guardrail
  task_type: authoring-agent
  description: "A developer asks (naively) for tests for a chat assistant's safety guardrail; scored against the deterministic gates."
  trials: 3
  turns:
    - role: user
      content: |
        I'm adding a safety layer to our chat assistant. I want it to catch toxic
        or abusive user messages and respond with a safe fallback instead of
        passing them through to the model, while letting normal messages go
        through untouched. I need tests that prove the guardrail actually fires on
        the bad stuff and stays out of the way for the good stuff — and I want to
        run them offline, no API keys, while I'm setting it up. Can you build that
        in a `kit/` folder?
