# Mock responses for the workflow-support example.
# Responses are keyed by scenario ID and turn number.
#
# Turn numbering accounts for the ProviderStage multi-round loop:
# - Turn N: LLM responds with tool call (workflow__transition)
# - Turn N+1: LLM sees tool result and responds with text (no more tool calls)
# Each pipeline execution consumes 2 mock turns when a transition occurs.

scenarios:
  basic-flow:
    turns:
      # Pipeline turn 1: Customer contacts support (intake state, no transition)
      1: "Hello! Welcome to TechCo support. I'm sorry to hear you're having trouble with your billing. Let me help you with that. Could you share your account number so I can look into the charges?"

      # Pipeline turn 2: Agent escalates to specialist
      2:
        response: "Thank you for providing your account number. I can see the charge on your account. This appears to be a complex billing discrepancy that requires our billing specialist team to investigate. Let me escalate this for a detailed review."
        tool_calls:
          - name: workflow__transition
            arguments:
              event: Escalate
              context: "Customer reports duplicate charge of $49.99 on account AC-12345. Needs billing specialist review."
      3: "I've escalated your case to our billing specialist. They'll take over from here."

      # Pipeline turn 3: Specialist resolves the issue
      4:
        response: "Hello, I'm a senior billing specialist. I've reviewed your account. The duplicate charge was caused by a system error. I'm processing a refund of $49.99. Let me close this case."
        tool_calls:
          - name: workflow__transition
            arguments:
              event: Resolve
              context: "Refund of $49.99 processed for duplicate charge on account AC-12345."
      5: "The refund has been submitted and should appear on your statement within 3-5 business days."

      # Pipeline turn 4: Closing summary
      6: "You're welcome! To summarize: we identified a duplicate charge of $49.99 caused by a system error, and a refund has been processed. You should see it within 3-5 business days. Thank you for your patience!"

  state-assertions:
    turns:
      # Pipeline turn 1: Customer reports issue (intake state, no transition)
      1: "Welcome to TechCo support! I understand you're having trouble logging in. Let me help troubleshoot this. What error message are you seeing when you try to log in?"

      # Pipeline turn 2: Customer provides detail (no transition)
      2: "Thank you for those details. It sounds like your account may have been locked after multiple failed attempts. Let me verify — are you using the correct email address associated with your account?"

      # Pipeline turn 3: Agent resolves, transitions to closed
      3:
        response: "I've reviewed your situation and it does appear your account was locked due to security protocols. I've now unlocked your account and sent a password reset link to your email."
        tool_calls:
          - name: workflow__transition
            arguments:
              event: Resolve
              context: "Account was locked due to security protocols. Account unlocked and password reset link sent."
      4: "Your account has been unlocked and the password reset link has been sent to your email."

      # Pipeline turn 4: Confirm resolution
      5: "Great, I'm glad the password reset worked! Your account is now fully accessible. Thank you for contacting TechCo support."
