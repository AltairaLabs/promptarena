apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Scenario
metadata:
  name: math-calculation
spec:
  id: math-calculation
  task_type: assistant
  description: "Test single tool call to MathJS API with live HTTP executor"

  turns:
    - role: user
      content: "What is the square root of 144 plus 3 squared?"
      assertions:
        - type: tools_called
          params:
            tool_names: ["calculate"]
            message: "Should call the calculate tool"
        - type: tool_result_matches
          params:
            tool: calculate
            pattern: "21"
            message: "calculate should return 21 (sqrt(144)=12, 3^2=9, 12+9=21)"

    - role: user
      content: "Thanks for the answer."
      assertions:
        - type: content_matches
          params:
            pattern: "(?i)(21|result|square)"
            message: "Should reference the calculation result"

  tool_policy:
    tool_choice: auto
    max_tool_calls_per_turn: 2
    max_total_tool_calls: 5
