apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: anthropic-sonnet
spec:
  id: anthropic-sonnet
  type: claude
  model: claude-sonnet-4-6
  capabilities:
    - text
    - streaming
    - tools
    - json
  defaults:
    temperature: 0.1
    top_p: 1.0
    max_tokens: 4096
  pricing:
    input_cost_per_1k: 0.003
    output_cost_per_1k: 0.015
  stream_retry:
    enabled: true
    max_attempts: 3
