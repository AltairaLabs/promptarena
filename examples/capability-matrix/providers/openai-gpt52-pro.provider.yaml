apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: openai-gpt52-pro
spec:
  id: openai-gpt52-pro
  type: openai
  model: gpt-5.2-pro
  capabilities:
    - text
    - streaming
    - vision
    - tools
    - json
  unsupported_params:
    - temperature
    - top_p
  # gpt-5.2-pro is only served by the Responses API; declare it rather than
  # relying on the provider's model-name fallback.
  additional_config:
    api_mode: responses
  defaults:
    temperature: 0.1
    max_tokens: 100
    top_p: 1.0
  pricing:
    input_cost_per_1k: 0.01
    output_cost_per_1k: 0.03
  stream_retry:
    enabled: true
    max_attempts: 3
