apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Scenario
metadata:
  name: refund-assistant
  labels:
    use_case: support
    complexity: medium
spec:
  id: refund-assistant
  task_type: authoring-agent
  description: "A developer asks (naively) for tests for a refund assistant; scored against the deterministic gates."
  trials: 1
  tool_policy:
    tool_choice: auto
    max_tool_calls_per_turn: 50
    max_total_tool_calls: 500
    max_cost_usd: 0.50
  turns:
    - role: user
      content: |
        I'm building a customer support assistant for our online store that
        handles refund requests. It needs to check whether an order is still
        within our 30-day refund window and approve or decline accordingly, and
        it has to stay polite and professional even when customers get angry or
        abusive. Before I ship it I want a test suite I can run locally without
        burning API credits, so I can iterate on the prompt. Keep it lean — just
        the tests and a short README, I don't need a pile of extra docs or
        boilerplate. Can you set that up for me in a `kit/` folder?
