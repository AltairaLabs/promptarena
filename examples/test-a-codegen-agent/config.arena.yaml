apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Arena
metadata:
  name: codegen-agent-test
  annotations:
    description: |
      Brief-equipped codegen agent authors a PromptArena kit; gates score the result.
      Live only (real Claude + Docker).
      Run:
        export ANTHROPIC_API_KEY=...
        make build-codegen-agent-sandbox
        cd examples/test-a-codegen-agent
        promptarena run -c config.arena.yaml --ci --format html
spec:
  prompt_configs:
    - id: authoring-agent
      file: prompts/authoring-agent.yaml
  providers:
    - file: providers/claude.provider.yaml
    - file: providers/openai.provider.yaml
    - file: providers/gemini.provider.yaml
  scenarios:
    - file: scenarios/refund-assistant.scenario.yaml
    - file: scenarios/faq-bot.scenario.yaml
    - file: scenarios/code-reviewer.scenario.yaml
    - file: scenarios/triage-router.scenario.yaml
    - file: scenarios/sentiment-guardrail.scenario.yaml
  mcp_servers:
    - name: sandbox
      source: docker
      scope: session
      source_args:
        image: codegen-agent-sandbox:local

  # The promptarena-authoring skill, loaded as a skill__activate tool (NOT
  # preloaded, so the system prompt stays equal to the AGENTS.md brief). This
  # equips the agent the way a real skills-enabled coding agent is equipped —
  # the skill is discoverable, not just a file it might forget to read. Kept in
  # sync with agentkb.Skill() by a parity test.
  skills:
    - path: skills

  # Workspace capture as a regular runtime exec SessionHook (no promptarena flag).
  # At session_end the host runs capture-workspace.sh, which docker-cp's each
  # sandbox's /workspace into out/kit/<session>/. Needs PROMPTKIT_SCHEMA_SOURCE=local
  # until the `runtime:` field is released.
  runtime:
    hooks:
      capture-workspace:
        hook: session
        phases: ["session_end"]
        mode: observe
        command: tools/capture-workspace.sh

  globals:
    conversation_assertions:
      - type: tool_exec
        message: "Gate 1: kit is schema-valid"
        params:
          tool: Bash
          timeout_seconds: 120
          success_pattern: "__GATE_OK__"
          args:
            command: "promptarena validate /workspace/kit/config.arena.yaml && echo __GATE_OK__"
            description: "Validate the generated kit's arena config against its schema"
      - type: tool_exec
        message: "Gate 2: kit compiles to a valid PromptPack"
        params:
          tool: Bash
          timeout_seconds: 120
          success_pattern: "__GATE_OK__"
          args:
            command: "packc compile -c /workspace/kit/config.arena.yaml -o /tmp/kit.pack.json && packc validate /tmp/kit.pack.json && echo __GATE_OK__"
            description: "Compile the kit to a PromptPack and validate it"
      - type: tool_exec
        message: "Gate 3: generated scenarios run green offline"
        params:
          tool: Bash
          timeout_seconds: 300
          success_pattern: "__GATE_OK__"
          args:
            command: "cd /workspace/kit && promptarena run --ci && echo __GATE_OK__"
            description: "Run the generated kit's scenarios offline"
      - type: tool_exec
        message: "Gate 4: no unused files"
        params:
          tool: Bash
          timeout_seconds: 60
          success_pattern: "__GATE_OK__"
          args:
            command: "unused-files.sh /workspace/kit && echo __GATE_OK__"
            description: "Check the kit for unreferenced files"
      - type: tool_exec
        message: "Gate 5: kit is a competent test suite (non-trivial assertions)"
        params:
          tool: Bash
          timeout_seconds: 60
          success_pattern: "__GATE_OK__"
          args:
            command: "kit-quality.sh /workspace/kit && echo __GATE_OK__"
            description: "Deterministic adequacy check: every scenario has a non-trivial assertion"
      - type: tool_exec
        message: "Metric: idiom-trap + adequacy report (non-gating)"
        params:
          tool: Bash
          timeout_seconds: 60
          success_pattern: "__GATE_OK__"
          args:
            command: "idiom-traps.sh /workspace/kit && echo __GATE_OK__"
            description: "Report idiom-trap and assertion-adequacy counts for the kit"
  defaults:
    temperature: 0.3
    max_tokens: 4096
    output:
      dir: out
      formats: ["json", "html"]
      html:
        file: report.html
