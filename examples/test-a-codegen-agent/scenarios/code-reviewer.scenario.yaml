apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Scenario
metadata:
  name: code-reviewer
  labels:
    use_case: devtools
    complexity: medium
spec:
  id: code-reviewer
  task_type: authoring-agent
  description: "A developer asks (naively) for tests for a code-review assistant; scored against the deterministic gates."
  trials: 3
  turns:
    - role: user
      content: |
        We're adding an AI code-review assistant to our pull-request workflow. It
        should catch real bugs and also flag smaller style nits, and — this is
        important — it has to return its findings in a consistent, parseable
        format so our bot can post them as inline review comments. I'd like tests
        that check both that it catches issues and that the output format stays
        consistent, and I want to run them locally without any API keys while I
        develop. Can you set it up in a `kit/` folder?
