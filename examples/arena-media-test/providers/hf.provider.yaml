# yaml-language-server: $schema=https://promptkit.altairalabs.ai/schemas/latest/provider.json
#
# HuggingFace Inference API client for non-LLM model inference. Consumed by the
# `image_moderation` assertion on the tool-image-generation scenario to score
# the image that image__generate produces.
#
# Image-classification models (unlike the retired audio SER models) are still
# served on HF's free serverless tier (`router.huggingface.co/hf-inference`),
# so the demo's target model `Falconsai/nsfw_image_detection` works with just an
# HF_TOKEN — no dedicated Inference Endpoint required. Leave base_url unset.
#
# Without HF_TOKEN, image_moderation skips cleanly (Skipped, not failed), so
# keyless CI still passes.
apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: hf
spec:
  id: hf
  type: huggingface
  role: inference
  credential:
    credential_env: HF_TOKEN
