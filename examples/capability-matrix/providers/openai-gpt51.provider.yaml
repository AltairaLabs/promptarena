apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: openai-gpt51
spec:
  id: openai-gpt51
  type: openai
  model: gpt-5.1
  capabilities:
    - text
    - streaming
    - vision
    - tools
    - json
  defaults:
    temperature: 0.1
    max_tokens: 100
    top_p: 1.0
  pricing:
    input_cost_per_1k: 0.005
    output_cost_per_1k: 0.015
  stream_retry:
    enabled: true
    max_attempts: 3
