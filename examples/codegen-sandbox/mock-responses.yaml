# Mock responses for the codegen-sandbox example.
#
# The mock provider simulates the LLM's decisions; tools themselves execute
# against whichever MCP server is configured. When --mock-provider is used
# with this example, tool calls are matched against the assertions but no
# real sandbox is required — making this example CI-safe even without Docker.

scenarios:
  simple-fix:
    turns:
      1:
        response: "Setting up the workspace with a buggy add function and a failing test."
        tool_calls:
          - name: Bash
            arguments:
              description: "seed workspace with go module, buggy add, and failing test"
              command: |
                set -e
                mkdir -p /workspace
                cd /workspace
                cat > go.mod <<'GOMOD'
                module example.com/add

                go 1.21
                GOMOD
                cat > add.go <<'ADDGO'
                package add

                // Add returns a + b. The negative-input branch is buggy.
                func Add(a, b int) int {
                    if a < 0 {
                        return a - b
                    }
                    return a + b
                }
                ADDGO
                cat > add_test.go <<'TESTGO'
                package add

                import "testing"

                func TestAdd(t *testing.T) {
                    if got := Add(-1, 2); got != 1 {
                        t.Fatalf("Add(-1, 2) = %d; want 1", got)
                    }
                }
                TESTGO
      2:
        response: "Now let me read add.go to find the bug."
        tool_calls:
          - name: Read
            arguments:
              file_path: /workspace/add.go
      3:
        response: "The negative branch returns `a - b` instead of `a + b`. Fixing."
        tool_calls:
          - name: Edit
            arguments:
              file_path: /workspace/add.go
              old_string: "return a - b"
              new_string: "return a + b"
      4:
        response: "Running the tests to verify."
        tool_calls:
          - name: run_tests
            arguments: {}
      5: "Tests pass. The bug was the negative branch returning a-b instead of a+b. Fixed."
