# yaml-language-server: $schema=https://promptkit.altairalabs.ai/schemas/latest/provider.json
#
# Google Gemini — native bidirectional voice (Gemini Live API, ASM mode).
#
# Like the OpenAI Realtime provider, this streams mic PCM straight into the
# Gemini Live connection and plays back the audio it returns — STT + LLM + TTS +
# turn detection all happen server-side. In `promptarena chat`, pick it from the
# provider list alongside openai-realtime.
#
# Requires GEMINI_API_KEY (or GOOGLE_API_KEY) in the environment.
#
apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: gemini-realtime
spec:
  id: gemini-realtime
  type: gemini
  # Gemini Live "native audio" model. This is the known-working 2.5 native-audio
  # model; if your account exposes a Gemini 3 native-audio Live model, set its id
  # here (the Gemini 3 native-audio Live model id was not confirmed when this was
  # written).
  model: gemini-2.5-flash-native-audio-latest
  defaults:
    temperature: 0.7
    top_p: 1.0
    max_tokens: 1000
  additional_config:
    # realtime: true makes the voice console treat this as a native-realtime
    # (ASM) provider, identical to openai-realtime.
    realtime: true
    # Enable the audio modality for bidirectional Live streaming.
    audio_enabled: true
    # Gemini Live returns ONE modality at a time; AUDIO yields audio plus an
    # output transcription.
    response_modalities:
      - AUDIO
