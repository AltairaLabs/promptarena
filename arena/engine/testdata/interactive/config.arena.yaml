apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Arena
metadata:
  name: interactive-fixture
spec:
  prompt_configs:
    - id: basic
      file: prompts/basic.yaml
  providers:
    - file: providers/mock.provider.yaml
  pack_evals:
    - id: json_check
      type: json_valid
      trigger: on_session_complete
      description: "Deterministic judge-free eval for tests"
      params:
        allow_wrapped: false
  defaults:
    temperature: 0.5
    max_tokens: 100
