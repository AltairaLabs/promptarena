apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Arena
metadata:
  name: document-analysis
spec:
  prompt_configs:
    - id: classify_doc
      file: prompts/classify_doc.yaml
    - id: extract_paper
      file: prompts/extract_paper.yaml
    - id: extract_general
      file: prompts/extract_general.yaml
    - id: meta_summary
      file: prompts/meta_summary.yaml
    - id: meta_keywords
      file: prompts/meta_keywords.yaml
    - id: synthesize_doc
      file: prompts/synthesize_doc.yaml

  providers:
    - file: providers/mock-provider.yaml

  scenarios:
    - file: scenarios/research-paper.scenario.yaml

  workflow:
    version: 1
    entry: analyzing
    states:
      analyzing:
        orchestration: composition
        composition: analyze_document
        terminal: true

  compositions:
    analyze_document:
      version: 1
      output: synthesize
      steps:
        - id: classify
          kind: prompt
          prompt_task: classify_doc
          input: "${input}"
          output_schema: schemas/classify_output.json
        - id: route
          kind: branch
          predicate:
            path: "${classify.output.type}"
            op: equals
            value: "research_paper"
          then: extract_paper
          else: extract_general
        - id: extract_paper
          kind: prompt
          prompt_task: extract_paper
          input: "${input}"
        - id: extract_general
          kind: prompt
          prompt_task: extract_general
          input: "${input}"
        - id: meta
          kind: parallel
          branches:
            - id: meta_summary
              kind: prompt
              prompt_task: meta_summary
              input: "${input}"
            - id: meta_keywords
              kind: prompt
              prompt_task: meta_keywords
              input: "${input}"
          reduce:
            strategy: barrier
            into: metadata
        - id: synthesize
          kind: agent
          prompt_task: synthesize_doc
          input: "${meta.output.metadata}"
          termination:
            max_steps: 3

  defaults:
    temperature: 0.1
    max_tokens: 512
    output:
      dir: out
      formats: ["json", "html"]
