apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Arena
metadata:
  name: codegen-eval-sonnet-baseline
  annotations:
    description: |
      Bundle A: Sonnet 4.6, no discipline skill. Baseline for the spike.

spec:
  prompt_configs:
    - id: codegen-agent
      file: packs/codegen-agent.yaml

  providers:
    - file: providers/claude-sonnet.provider.yaml

  scenarios:
    - file: scenarios/go-add-bugfix.scenario.yaml
    - file: scenarios/go-strings-reverse.scenario.yaml
    - file: scenarios/go-fizzbuzz-order.scenario.yaml
    - file: scenarios/go-counter-race.scenario.yaml
    - file: scenarios/go-binary-search.scenario.yaml

  mcp_servers:
    - name: sandbox
      source: docker
      scope: session
      source_args:
        image: ghcr.io/altairalabs/codegen-sandbox:latest
        env:
          DEV_MODE: "1"

  # Host-only metric skill — mounted into the sandbox at /skills/codegen-metrics
  # so session-level evals can run scripts like diff_stats.sh, but never
  # surfaced to the agent (preload: false). The explicit `name` is what
  # drives the in-container mount target.
  skills:
    - name: codegen-metrics
      path: skills/codegen-metrics
      preload: false

  # Pack-level eval: a non-gating measurement that fires once per session.
  # Captures the agent's workspace LOC stats into EvalResult.Details for
  # jq aggregation. Both bundles run the same eval so per-scenario diffs
  # are directly comparable in reporting.
  pack_evals:
    - id: diff_stats
      type: tool_exec
      trigger: on_session_complete
      description: "Total/impl/test LOC and file count in /workspace at session end."
      params:
        tool: Bash
        args:
          command: "bash /skills/codegen-metrics/scripts/diff_stats.sh"
          description: "Capture diff_stats soft-metric"
        timeout_seconds: 10

  defaults:
    temperature: 0.1
    max_tokens: 4096
    output:
      dir: out/sonnet-baseline
      formats: ["json", "html"]
