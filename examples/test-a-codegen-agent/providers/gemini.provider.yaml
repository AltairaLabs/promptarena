apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: gemini
spec:
  id: gemini
  type: gemini
  model: gemini-2.5-pro
  capabilities:
    - text
    - streaming
    - tools
    - json
  defaults:
    temperature: 0.3
    max_tokens: 8192
    top_p: 1.0
  pricing:
    input_cost_per_1k: 0.00125
    output_cost_per_1k: 0.010
  stream_retry:
    enabled: true
    max_attempts: 3
