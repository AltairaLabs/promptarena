name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  # The frontend pulls @altairalabs/atlas from GitHub Packages (private). An
  # explicit permissions block sets every unlisted scope to none, so without
  # this the install 403s even when the package grants this repo read access.
  packages: read

jobs:
  # Detect whether anything outside docs/ changed. The Go pipeline is gated on
  # this so docs-only changes (which have their own Documentation workflow)
  # don't run — or fail — the Go build/lint. A *skipped* required job still
  # satisfies branch protection, unlike a workflow filtered out by `paths`.
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      actions: ${{ steps.filter.outputs.actions }}
      examples: ${{ steps.filter.outputs.examples }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              # Core Go lives in arena/ and packc/. Example packs are NOT part
              # of the shippable module (they're verified by test-examples), so
              # they're deliberately excluded here — an examples-only PR then
              # skips the Go pipeline (a skipped required job still satisfies
              # branch protection). A positive list is used rather than a
              # `!examples/**` negation because dorny/paths-filter ORs patterns
              # (negations don't subtract).
              - 'arena/**/*.go'
              - 'packc/**/*.go'
              - 'tools/**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - 'sonar-project.properties'
              - 'npm/**'
              # The web UI is built and tested inside Build & Test (tsc, vite,
              # vitest) and embedded into the Go binary, so a frontend-only
              # change must run that job. Without this a pure frontend PR — a
              # dependency bump, or any .tsx edit — skips build, typecheck and
              # the whole frontend suite, and merges unvalidated.
              - 'arena/web/frontend/**'
              # Changes to this workflow itself must re-run the Go pipeline it
              # defines — otherwise a change to how build/test/coverage/scan run
              # is never exercised before merge.
              - '.github/workflows/ci.yml'
            actions:
              - '.github/actions/**'
            examples:
              - 'examples/**'
              - 'arena/cmd/**'
              - 'schemas/**'

  build-test:
    name: Build & Test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
      - name: Install ALSA dev headers (for voice CGO)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build
        run: go build ./...
      # Single source of truth for the test run: produce the coverage report
      # here and hand it to the SonarCloud job as an artifact, so the full suite
      # runs once per CI instead of twice. Flags match what Sonar expects
      # (sonar.go.coverage.reportPaths=coverage.out).
      - name: Test (with coverage)
        run: go test ./... -coverprofile=coverage.out -count=1
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          retention-days: 1
      # The hosted JSON schemas (served from promptkit.altairalabs.ai) are
      # generated from arena/arenaconfig + PromptKit/pkg/config. Fail the build
      # if a config-type change didn't regenerate schemas/v1alpha1.
      - name: Schemas up to date
        run: go run ./tools/schema-gen/ --check
      # Frontend (React/TS): build catches type errors via `tsc -b`; the test
      # run produces the lcov report SonarCloud needs for .ts/.tsx coverage.
      # Single source of truth for the frontend suite, same as the Go coverage
      # above — run once here and hand the report to the SonarCloud job.
      # The frontend uses pnpm, and pulls @altairalabs/atlas from GitHub
      # Packages (private), so the install needs a token with read:packages.
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: arena/web/frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm --dir arena/web/frontend install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ATLAS_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Build frontend
        run: pnpm --dir arena/web/frontend build
      - name: Test frontend (with coverage)
        run: pnpm --dir arena/web/frontend test:ci
      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: arena/web/frontend/coverage/lcov.info
          retention-days: 1

  lint:
    name: Lint (new code)
    # Inherited baseline: lint only NEW code on PRs. The extracted arena/packc
    # carry pre-existing findings grandfathered from PromptKit; hold new work to
    # standard without blocking on the inherited debt.
    needs: changes
    if: needs.changes.outputs.code == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
      - name: Install ALSA dev headers (for voice CGO)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      # v7 installs golangci-lint v2, matching the repo's `version: "2"`
      # .golangci.yml. v6 pins golangci-lint v1 (1.64.x), which rejects the v2
      # config and refused to run against go.mod's `go 1.26.0`.
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          only-new-issues: true

  sonarcloud:
    name: SonarCloud
    # Reuse the coverage report produced by build-test rather than re-running the
    # whole suite: the SonarGo analyzer parses sources directly and only needs
    # coverage.out, so no Go toolchain / build / test step is required here.
    needs: [changes, build-test]
    # dependabot PRs cannot access secrets
    if: needs.changes.outputs.code == 'true' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: go-coverage
      - name: Download frontend coverage report
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: arena/web/frontend/coverage/
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  test-actions:
    name: Test GitHub Actions (TypeScript)
    needs: changes
    if: needs.changes.outputs.actions == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        action: [promptarena-action, packc-action]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: .github/actions/${{ matrix.action }}/package-lock.json
      - name: Install dependencies
        working-directory: .github/actions/${{ matrix.action }}
        run: npm ci
      - name: Lint
        working-directory: .github/actions/${{ matrix.action }}
        run: npm run lint
      - name: Test
        working-directory: .github/actions/${{ matrix.action }}
        run: npm test

  test-examples:
    name: Test example packs
    needs: changes
    if: needs.changes.outputs.examples == 'true'
    runs-on: ubuntu-latest
    env:
      # Validate against the in-repo schema snapshots (matches the runtime the
      # packs ship against) rather than the published remote schemas.
      PROMPTKIT_SCHEMA_SOURCE: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
      - name: Install ALSA dev headers (for voice CGO)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build promptarena
        run: go build -o bin/promptarena ./arena/cmd/promptarena

      - name: Validate every example config against the schemas
        run: |
          FAILED=0; TOTAL=0
          while IFS= read -r cfg; do
            TOTAL=$((TOTAL+1))
            if ! ./bin/promptarena validate "$cfg" --schema-only >/dev/null 2>&1; then
              echo "::error::$cfg failed schema validation"
              ./bin/promptarena validate "$cfg" --schema-only 2>&1 | grep -iE 'error|❌' | head -5
              FAILED=$((FAILED+1))
            fi
          done < <(find examples -maxdepth 2 \( -name 'config.arena.yaml' -o -name '*.arena.yaml' -o -name 'arena.yaml' \) -not -path '*/out/*' | sort)
          echo "Validated $TOTAL config(s); $FAILED failed."
          [ $FAILED -eq 0 ]

      - name: Mock-run the showcase examples
        run: |
          set -e
          run() { local ex="$1"; shift; echo "=== $ex ==="; ( cd "examples/$ex" && ../../bin/promptarena run "$@" ); }
          run customer-support  --config config.arena.yaml --ci --mock-provider --mock-config mock-responses.yaml --scenario customer-support-scenarios --formats json
          run multimodal-basics --config config.arena.yaml --ci --mock-provider --mock-config mock-responses.yaml --formats json
          run variables-demo    --config config.arena.yaml --ci --mock-provider --mock-config mock-config.yaml --formats json
          run assertions-test   --config config.arena.yaml --ci --mock-provider --mock-config mock-responses.yaml --formats json
          run llm-judge         --config config.arena.yaml --ci --formats json
          run guardrails-test   --config config.arena.yaml --ci --formats json
          run eval-test         --config config.arena.yaml --ci --formats json
          run document-analysis --config config.arena.yaml --ci --formats json
