apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: PromptConfig
metadata:
  name: content-filter
spec:
  task_type: "assistant"
  version: "v1.0.0"
  description: "Content filter test prompt for guardrail assertion testing"

  system_template: |
    You are a helpful assistant that provides information on various topics.
    You should be informative and respectful in your responses.

  # Validators run as guardrail hooks. Every hit rewrites the assistant
  # message in place — there is no monitor-only mode. For pure observation,
  # declare an eval and assert on its score in scenarios.
  validators:
    - type: banned_words
      params:
        words:
          - damn
          - crap
          - hell
        case_sensitive: false

    - type: length
      params:
        max_characters: 100
