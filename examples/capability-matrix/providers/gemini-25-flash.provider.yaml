apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: gemini-25-flash
spec:
  id: gemini-25-flash
  type: gemini
  model: gemini-2.5-flash
  capabilities:
    - text
    - streaming
    - vision
    - tools
    - json
    - audio
    - video
    - documents
    - duplex
  defaults:
    temperature: 0.1
    max_tokens: 100
    top_p: 1.0
  pricing:
    input_cost_per_1k: 0.00015
    output_cost_per_1k: 0.0006
  stream_retry:
    enabled: true
    max_attempts: 3
