# SonarCloud configuration for PromptArena
sonar.projectKey=AltairaLabs_promptarena
sonar.organization=altairalabs

sonar.projectName=PromptArena
sonar.projectVersion=1.0

# Source configuration — Go tools + npm wrappers
sonar.sources=arena,packc,npm
sonar.inclusions=**/*.go,**/*.ts,**/*.js
sonar.exclusions=**/*_test.go,**/test_*.go,**/*.test.ts,**/*.test.js,**/tests/**,**/testdata/**,**/vendor/**,**/bin/**,**/*.md,**/.git/**,**/node_modules/**,**/*_interactive.go,**/*_integration.go,**/dist/**,**/coverage/**,**/jest.config.js,**/jest.config.ts,**/*.pb.go

# Go settings
sonar.go.coverage.reportPaths=coverage.out

# JavaScript coverage (npm wrappers)
sonar.javascript.lcov.reportPaths=npm/promptarena/coverage/lcov.info,npm/packc/coverage/lcov.info

# Coverage exclusions — untestable interactive I/O, integration code, platform-specific
# (CI is Linux), CLI entrypoints, npm bin wrappers, generated protobuf.
sonar.coverage.exclusions=**/arena/cmd/promptarena/init.go,**/*_interactive.go,**/*_integration.go,**/*_windows.go,**/*_darwin.go,**/dist/**,**/npm/**/bin/**,**/npm/**/postinstall.js,**/*.pb.go,**/arena/agentkb/**,**/arena/inspect/grid.go
