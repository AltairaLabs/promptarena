# yaml-language-server: $schema=https://promptkit.altairalabs.ai/schemas/latest/provider.json
#
# OpenAI Whisper — speech-to-text (STT).
#
# Sample provider demonstrating `role: stt` for documentation and voice
# console integration (epic #1444). Not wired into the default scenario
# config; add it to a scenario's providers list when exercising STT-only
# or mixed STT+TTS pipelines.
#
# Requires OPENAI_API_KEY in the environment.
#
apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: openai-stt
spec:
  id: openai-stt
  type: openai
  role: stt
  model: whisper-1
  credential:
    credential_env: OPENAI_API_KEY
