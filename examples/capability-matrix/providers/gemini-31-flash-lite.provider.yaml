apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: gemini-31-flash-lite
spec:
  id: gemini-31-flash-lite
  type: gemini
  model: gemini-3.1-flash-lite
  capabilities:
    - text
    - streaming
    - vision
    - tools
    - json
    - audio
    - video
    - documents
    - duplex
  defaults:
    temperature: 0.1
    max_tokens: 100
    top_p: 1.0
  pricing:
    input_cost_per_1k: 0.0001
    output_cost_per_1k: 0.0004
  stream_retry:
    enabled: true
    max_attempts: 3
