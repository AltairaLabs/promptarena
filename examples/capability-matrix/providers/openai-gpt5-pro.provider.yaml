apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: openai-gpt5-pro
spec:
  id: openai-gpt5-pro
  type: openai
  model: gpt-5-pro
  capabilities:
    - text
    - streaming
    - vision
    - tools
    - json
  unsupported_params:
    - temperature
    - top_p
  # gpt-5-pro is only served by the Responses API; declare it rather than
  # relying on the provider's model-name fallback.
  additional_config:
    api_mode: responses
  defaults:
    temperature: 0.1
    max_tokens: 100
    top_p: 1.0
  pricing:
    input_cost_per_1k: 0.01
    output_cost_per_1k: 0.03
  # Opt in to Phase 1 pre-first-chunk streaming retry. gpt-5-pro has
  # been hitting transient "http2: response body closed" failures in
  # the scheduled capability-matrix run; this retries the initial
  # attempt if the stream fails before any content chunk is forwarded.
  # See docs/local-backlog/STREAMING_RETRY_AT_SCALE.md.
  stream_retry:
    enabled: true
    max_attempts: 2
    initial_delay: 250ms
    max_delay: 2s
