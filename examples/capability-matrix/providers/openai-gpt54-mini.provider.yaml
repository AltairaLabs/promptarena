apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: openai-gpt54-mini
spec:
  id: openai-gpt54-mini
  type: openai
  model: gpt-5.4-mini
  capabilities:
    - text
    - streaming
    - tools
    - json
  defaults:
    temperature: 0.1
    max_tokens: 100
    top_p: 1.0
  pricing:
    input_cost_per_1k: 0.00025
    output_cost_per_1k: 0.002
  stream_retry:
    enabled: true
    max_attempts: 3
