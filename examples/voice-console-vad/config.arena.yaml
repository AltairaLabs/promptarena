# yaml-language-server: $schema=https://promptkit.altairalabs.ai/schemas/latest/arena.json
#
# Voice Console — VAD (composed) mode
#
# Talk to a plain TEXT agent (gpt-4o) by voice. The console records the mic
# until silence (VAD), transcribes via STT, sends a text turn, then speaks the
# reply via TTS:
#   promptarena-voice chat --voice \
#     --voice-stt openai-stt --voice-output-voice agent-voice \
#     --config config.arena.yaml
#
# Providers carry roles: the loader routes role:stt -> STT registry and
# role:tts -> the voices binding; only the role:llm provider (openai-gpt4o) is
# the agent. Use headphones (the mic stays open).
#
apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Arena
metadata:
  name: voice-console-vad
spec:
  prompt_configs:
    - id: voice-assistant
      file: prompts/assistant.prompt.yaml

  providers:
    - file: providers/openai-gpt4o.provider.yaml
    - file: providers/openai-stt.provider.yaml
    - file: providers/openai-tts.provider.yaml

  voices:
    - id: agent-voice
      provider: openai-tts

  defaults:
    temperature: 0.7
    max_tokens: 500
    seed: 42
    concurrency: 1
