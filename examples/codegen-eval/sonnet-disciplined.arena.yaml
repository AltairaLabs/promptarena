apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Arena
metadata:
  name: codegen-eval-sonnet-disciplined
  annotations:
    description: |
      Bundle D: Sonnet 4.6 + the codegen-disciplined skill (Read-before-Edit,
      verify-before-done). Same model + tools + scenarios as bundle A.

spec:
  prompt_configs:
    - id: codegen-agent
      file: packs/codegen-agent.yaml

  providers:
    - file: providers/claude-sonnet.provider.yaml

  scenarios:
    - file: scenarios/go-add-bugfix.scenario.yaml
    - file: scenarios/go-strings-reverse.scenario.yaml
    - file: scenarios/go-fizzbuzz-order.scenario.yaml
    - file: scenarios/go-counter-race.scenario.yaml
    - file: scenarios/go-binary-search.scenario.yaml

  mcp_servers:
    - name: sandbox
      source: docker
      scope: session
      source_args:
        image: ghcr.io/altairalabs/codegen-sandbox:latest
        env:
          DEV_MODE: "1"

  skills:
    - name: codegen-disciplined
      path: skills/codegen-disciplined
      preload: true
    # Host-only metric skill — mounted into the sandbox so the
    # diff_stats.sh script is reachable from session-level evals,
    # but not surfaced to the agent.
    - name: codegen-metrics
      path: skills/codegen-metrics
      preload: false

  # Same soft-metric eval as the baseline — see baseline config for
  # the rationale. Both bundles produce the metric so per-scenario
  # diffs are directly comparable.
  pack_evals:
    - id: diff_stats
      type: tool_exec
      trigger: on_session_complete
      description: "Total/impl/test LOC and file count in /workspace at session end."
      params:
        tool: Bash
        args:
          command: "bash /skills/codegen-metrics/scripts/diff_stats.sh"
          description: "Capture diff_stats soft-metric"
        timeout_seconds: 10

  defaults:
    temperature: 0.1
    max_tokens: 4096
    output:
      dir: out/sonnet-disciplined
      formats: ["json", "html"]
